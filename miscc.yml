# 标签定义 - 为文章分类提供颜色和标题
tags:
  embedded:
    title: Embedded      # 标签显示名称
    color: "#8e44ad"     # 紫色
  misc:
    title: Misc          # 标签显示名称
    color: "#27ae60"     # 绿色
  recsys:
    title: RecSys
    color: "#e67e22"     # 橙色
  android:
    title: Android
    color: "#2980b9"     # 蓝色
  object-c:
    title: Objective C
    color: "#c0392b"     # 红色
  cross-platform:
    title: Cross Platform
    color: "#f39c12"     # 金黄色
  javascript:
    title: JavaScript
    color: "#f1c40f"     # 黄色
  python:
    title: Python
    color: "#34495e"     # 深灰色
  webdev:
    title: Web Development
    color: "#9b59b6"     # 靛紫色
  coding-workshop:
    title: Coding WorkShop
    color: "#1abc9c"     # 青色
  appdev:
    title: App Development
    color: "#d35400"     # 深橙色
  Gemini: 
    title: Gemini
    color: "#3498db"
  Manual: 
    title: Manual
    color: "#e84393"

# 目录配置
dirs:
  outputBase: "docs"        # 输出目录，默认 "dist"
  template: "template"      # 模板目录，默认 "template"
  assets: "assets"          # 资源目录，默认 "assets"
  assetsOutput: "assets"    # 资源输出目录，默认 "assets"
  posts: "posts"            # 文章源目录，默认 "posts"
  postsOutput: "posts"      # 文章输出目录，默认 "posts"

# 启用 RSS feed 生成
rss: true
